<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - Ospedale</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #34495e;
        }
        .link-footer {
            margin-top: 15px;
            font-size: 0.9em;
        }
        .link-footer a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Login</h2>
        <input type="text" id="nomeutente" placeholder="Nome Utente" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <select id="ruolo">
            <option value="medico">Medico</option>
            <option value="farmacista">Farmacista</option>
        </select>

        <button onclick="login()">Accedi</button>
        
        <div class="link-footer">
            Non hai un account? <a href="registrazione.html">Registrati qui</a>
        </div>
    </div>

    <script>
        function login() {
            const ruolo = document.getElementById('ruolo').value;
            
            if (ruolo === "medico") {
                window.location.href = 'index_medico.html';
            } else {
                window.location.href = 'index_farmacista.html';
            }
        }
    </script>

</body>
</html>
