<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - Ospedale</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            display: flex;
            gap: 30px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 5px;
            width: 250px;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2c3e50;
            color: white;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div class="box">
        <h2>Login</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Accedi</button>
    </div>

    <!-- REGISTRAZIONE -->
    <div class="box">
        <h2>Registrazione</h2>
        <input type="text" placeholder="Nome">
        <input type="text" placeholder="Cognome">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Registrati</button>
    </div>

</div>

</body>
</html>
